name: Validate research registers

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run repository validator tests
        run: python3 -m unittest tests/test_validate_repository.py
      - name: Validate canonical registers
        run: python3 scripts/validate_repository.py
